<!DOCTYPE html>
<html>
<head>
<title>Landing Page</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
}

/* Navbar */
header {
  display:flex;
  justify-content:space-between;
  padding:15px 50px;
  background:#222;
  color:white;
}
nav a {
  margin:0 15px;
  text-decoration:none;
  color:white;
}

/* Hero Section */
.hero {
  height:90vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  color:white;
  background:
    linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
    url('https://images.unsplash.com/photo-1492724441997-5dc865305da7');
  background-size:cover;
}

.hero h1 {
  font-size:45px;
}
.hero p {
  width:60%;
}

.hero button {
  padding:12px 25px;
  background:#4a8cff;
  border:none;
  color:white;
  margin-top:20px;
}

/* Features */
.features {
  display:flex;
  justify-content:space-around;
  padding:50px;
}

.box {
  width:25%;
  background:#f4f4f4;
  padding:20px;
  text-align:center;
  border-radius:10px;
}

/* Footer */
footer {
  text-align:center;
  padding:20px;
  background:#222;
  color:white;
}
</style>

</head>

<body>

<header>
  <h2>MyBrand</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#">Features</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h1>Welcome to My Landing Page</h1>
  <p>
    Build modern and responsive websites with simple HTML and CSS.
  </p>
  <button>Get Started</button>
</section>

<section class="features">
  <div class="box">
    <h3>Fast</h3>
    <p>Optimized performance for better experience.</p>
  </div>

  <div class="box">
    <h3>Responsive</h3>
    <p>Works on all devices.</p>
  </div>

  <div class="box">
    <h3>Modern</h3>
    <p>Clean and attractive design.</p>
  </div>
</section>

<footer>
  <p>© 2026 Amulu</p>
</footer>

</body>
</html>
