<!DOCTYPE html>
<html>
<head>
<title>Calculator</title>

<style>
body {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
  background:#222;
}

/* Calculator Box */
.calculator {
  background:#333;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 20px black;
}

/* Display */
#display {
  width:100%;
  height:50px;
  margin-bottom:10px;
  font-size:20px;
  text-align:right;
  padding:10px;
  border:none;
}

/* Buttons Grid */
.buttons {
  display:grid;
  grid-template-columns:repeat(4, 60px);
  gap:10px;
}

/* Buttons */
button {
  height:60px;
  font-size:18px;
  border:none;
  cursor:pointer;
}

.operator {
  background:#4a8cff;
  color:white;
}

.equal {
  background:green;
  color:white;
  grid-column:span 2;
}

.clear {
  background:red;
  color:white;
}
</style>

</head>

<body>

<div class="calculator">

  <input type="text" id="display" disabled>

  <div class="buttons">
    <button class="clear">C</button>
    <button class="operator">/</button>
    <button class="operator">*</button>
    <button class="operator">-</button>

    <button>7</button>
    <button>8</button>
    <button>9</button>
    <button class="operator">+</button>

    <button>4</button>
    <button>5</button>
    <button>6</button>
    <button>.</button>

    <button>1</button>
    <button>2</button>
    <button>3</button>
    <button class="equal">=</button>

    <button>0</button>
  </div>

</div>

<script>
let display = document.getElementById("display");
let buttons = document.querySelectorAll("button");

buttons.forEach(btn => {
  btn.addEventListener("click", function() {
    let value = this.innerText;

    if (value === "C") {
      display.value = "";
    } 
    else if (value === "=") {
      try {
        display.value = eval(display.value);
      } catch {
        display.value = "Error";
      }
    } 
    else {
      display.value += value;
    }
  });
});
</script>

</body>
</html>
